<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Student Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --dark:    #0F0E0C;
    --amber:   #E07B28;
    --amber2:  #F5A623;
    --cream:   #FAF8F3;
    --paper:   #F3EFE6;
    --border:  #E2D9C8;
    --muted:   #9C8F7E;
    --purple:  #7C5CBF;
    --teal:    #2A9D8F;
    --red:     #E63946;
    --white:   #FFFFFF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
  header { background: var(--dark); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; border-bottom: 3px solid var(--amber); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--white); letter-spacing: -0.5px; }
  .logo span { color: var(--amber); }
  nav { display: flex; gap: 6px; }
  nav button { background: transparent; border: none; color: #7A6E63; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all .2s; }
  nav button:hover { color: var(--white); background: #1E1C18; }
  nav button.active { background: var(--amber); color: var(--white); }
  .tab { display: none; padding: 32px; max-width: 1140px; margin: 0 auto; }
  .tab.active { display: block; }
  .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1; color: var(--dark); }
  .section-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .btn { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; transition: all .15s; }
  .btn-primary { background: var(--amber); color: var(--white); }
  .btn-primary:hover { background: var(--amber2); transform: translateY(-1px); }
  .btn-ghost { background: var(--paper); color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
  .btn-nav { background: var(--paper); border: 1.5px solid var(--border); color: var(--dark); font-size: 14px; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all .15s; }
  .btn-nav:hover { border-color: var(--amber); color: var(--amber); }
  .week-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .week-label { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--dark); background: var(--paper); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 20px; min-width: 220px; text-align: center; }
  .schedule-wrap { overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.07); }
  table { width: 100%; border-collapse: collapse; background: var(--white); min-width: 680px; }
  thead th { background: var(--dark); color: var(--white); padding: 14px 12px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-align: center; text-transform: uppercase; }
  thead th.time-col { color: var(--amber); width: 90px; }
  thead th.day-col { color: #B0A898; }
  thead th.day-col .day-name { font-size: 13px; color: var(--white); display: block; margin-top: 2px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  tbody tr:nth-child(even) td { background: #FDFBF8; }
  tbody td { border: 1px solid var(--border); padding: 6px; vertical-align: top; min-height: 52px; }
  tbody td.time-cell { background: var(--paper) !important; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); padding: 10px 6px; vertical-align: middle; }
  .class-cell { min-height: 52px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1.5px dashed var(--border); transition: all .15s; padding: 4px; }
  .class-cell:hover { border-color: var(--amber); background: #FFF8EE; }
  .class-cell.filled { border-style: solid; font-weight: 700; font-size: 12px; text-align: center; line-height: 1.3; }
  .class-cell .plus { color: var(--border); font-size: 20px; line-height: 1; }
  .hw-form { background: var(--white); border: 2px solid var(--amber); border-radius: 14px; padding: 24px; margin-bottom: 28px; box-shadow: 0 4px 20px rgba(224,123,40,.1); animation: slideDown .2s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .form-grid { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .form-grid input, .form-grid select, .hw-form input, .hw-form select { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--dark); background: var(--cream); outline: none; transition: border-color .15s; width: 100%; }
  .form-grid input:focus, .form-grid select:focus { border-color: var(--amber); }
  .hw-group-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--purple); margin: 20px 0 8px; }
  .hw-item { background: var(--white); border: 1.5px solid var(--border); border-left: 5px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: all .15s; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
  .hw-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .hw-item.done { opacity: .55; }
  .hw-item.done .hw-task { text-decoration: line-through; }
  .hw-item.priority-high  { border-left-color: var(--red); }
  .hw-item.priority-medium{ border-left-color: var(--amber2); }
  .hw-item.priority-low   { border-left-color: var(--teal); }
  .hw-check { width: 18px; height: 18px; cursor: pointer; accent-color: var(--amber); flex-shrink: 0; }
  .hw-body { flex: 1; min-width: 0; }
  .hw-class { font-size: 11px; color: var(--muted); margin-bottom: 2px; font-family: 'DM Mono', monospace; }
  .hw-task { font-size: 14px; font-weight: 700; color: var(--dark); }
  .hw-notes { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .priority-badge { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border-radius: 20px; padding: 3px 12px; flex-shrink: 0; }
  .badge-high   { background: #FEE2E2; color: #991B1B; }
  .badge-medium { background: #FEF3C7; color: #92400E; }
  .badge-low    { background: #D1FAE5; color: #065F46; }
  .hw-del { background: none; border: none; cursor: pointer; color: var(--border); font-size: 20px; line-height: 1; padding: 0 4px; transition: color .15s; flex-shrink: 0; }
  .hw-del:hover { color: var(--red); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .month-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .month-label { font-family: 'DM Serif Display', serif; font-size: 22px; min-width: 200px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.07); }
  .cal-day-header { background: var(--dark); color: var(--purple); text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 4px; }
  .cal-cell { background: var(--white); min-height: 110px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .cal-cell.empty { background: var(--paper); }
  .cal-cell.today .cal-num { background: var(--amber); color: var(--white); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .cal-num { font-weight: 800; font-size: 13px; color: var(--dark); width: 24px; height: 24px; display: flex; align-items: center; }
  .cal-dot { font-size: 10px; border-radius: 4px; padding: 2px 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-more { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 999; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--white); border-radius: 16px; padding: 28px; width: 380px; box-shadow: 0 24px 80px rgba(0,0,0,.22); animation: popIn .2s ease; }
  @keyframes popIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
  .modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 4px; }
  .modal .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; font-family: 'DM Mono', monospace; }
  .modal input[type=text] { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--dark); background: var(--cream); outline: none; margin-bottom: 16px; transition: border-color .15s; }
  .modal input[type=text]:focus { border-color: var(--amber); }
  .color-picks { display: flex; gap: 8px; margin-bottom: 20px; }
  .color-pick { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .15s; }
  .color-pick:hover { transform: scale(1.15); }
  .color-pick.selected { border-color: var(--dark); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; }
  .save-toast { position: fixed; bottom: 24px; right: 24px; background: var(--dark); color: var(--white); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 18px; border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; }
  .save-toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">My <span>Planner</span></div>
  <nav>
    <button class="active" onclick="switchTab('weekly', this)">📅 Weekly</button>
    <button onclick="switchTab('homework', this)">📝 Homework</button>
    <button onclick="switchTab('monthly', this)">🗓️ Monthly</button>
  </nav>
</header>

<div id="tab-weekly" class="tab active">
  <div class="section-header">
    <div>
      <div class="section-title">Weekly Schedule</div>
      <div class="section-sub">Click any cell to add a class</div>
    </div>
  </div>
  <div class="week-nav">
    <button class="btn-nav" onclick="changeWeek(-1)">← Prev</button>
    <div class="week-label" id="week-label"></div>
    <button class="btn-nav" onclick="changeWeek(1)">Next →</button>
    <button class="btn-ghost btn" onclick="resetWeek()">Today</button>
  </div>
  <div class="schedule-wrap">
    <table id="schedule-table">
      <thead>
        <tr>
          <th class="time-col">TIME</th>
          <th class="day-col" id="head-mon"><span class="day-name">Monday</span></th>
          <th class="day-col" id="head-tue"><span class="day-name">Tuesday</span></th>
          <th class="day-col" id="head-wed"><span class="day-name">Wednesday</span></th>
          <th class="day-col" id="head-thu"><span class="day-name">Thursday</span></th>
          <th class="day-col" id="head-fri"><span class="day-name">Friday</span></th>
        </tr>
      </thead>
      <tbody id="schedule-body"></tbody>
    </table>
  </div>
</div>

<div id="tab-homework" class="tab">
  <div class="section-header">
    <div>
      <div class="section-title">Homework & Assignments</div>
      <div class="section-sub">Track every task, due date & priority</div>
    </div>
    <button class="btn btn-primary" onclick="openHwForm()">+ Add Assignment</button>
  </div>
  <div id="hw-form-wrap" style="display:none">
    <div class="hw-form">
      <div class="form-grid">
        <input id="hw-class" placeholder="Class name" />
        <input id="hw-task" placeholder="Assignment / task description" />
        <input id="hw-due" type="date" />
        <select id="hw-priority">
          <option value="High">High Priority</option>
          <option value="Medium" selected>Medium Priority</option>
          <option value="Low">Low Priority</option>
        </select>
      </div>
      <input id="hw-notes" placeholder="Notes (optional)" style="width:100%; margin-bottom:16px;" />
      <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="saveHw()">Save Assignment</button>
        <button class="btn btn-ghost" onclick="closeHwForm()">Cancel</button>
      </div>
    </div>
  </div>
  <div id="hw-list-wrap"></div>
</div>

<div id="tab-monthly" class="tab">
  <div class="section-header">
    <div>
      <div class="section-title">Monthly Overview</div>
      <div class="section-sub">Homework due dates appear automatically</div>
    </div>
  </div>
  <div class="month-nav">
    <button class="btn-nav" onclick="changeMonth(-1)">← Prev</button>
    <div class="month-label" id="month-label"></div>
    <button class="btn-nav" onclick="changeMonth(1)">Next →</button>
    <button class="btn-ghost btn" onclick="resetMonth()">Today</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="modal-overlay" id="cell-modal" style="display:none" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <h3 id="modal-title">Add Class</h3>
    <div class="modal-sub" id="modal-sub"></div>
    <input type="text" id="modal-input" placeholder="e.g. Biology, Math 101..." onkeydown="if(event.key==='Enter') saveModal()" />
    <div class="color-picks" id="color-picks"></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="saveModal()">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">✓ Saved</div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const PERIODS = ['8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];
const CLASS_COLORS = [
  { bg:'#FEF3C7', border:'#F59E0B', text:'#92400E' },
  { bg:'#D1FAE5', border:'#10B981', text:'#065F46' },
  { bg:'#DBEAFE', border:'#3B82F6', text:'#1E40AF' },
  { bg:'#FCE7F3', border:'#EC4899', text:'#9D174D' },
  { bg:'#EDE9FE', border:'#8B5CF6', text:'#5B21B6' },
  { bg:'#FEE2E2', border:'#EF4444', text:'#991B1B' },
  { bg:'#ECFEFF', border:'#06B6D4', text:'#164E63' },
  { bg:'#F0FDF4', border:'#22C55E', text:'#14532D' },
];

let schedule = JSON.parse(localStorage.getItem('planner_schedule') || '{}');
let homework = JSON.parse(localStorage.getItem('planner_homework') || '[]');
let weekOffset = 0, monthOffset = 0, editCell = null, selectedColor = 0;

function save() {
  localStorage.setItem('planner_schedule', JSON.stringify(schedule));
  localStorage.setItem('planner_homework', JSON.stringify(homework));
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'weekly') renderSchedule();
  if (name === 'homework') renderHomework();
  if (name === 'monthly') renderCalendar();
}

function getMondayOf(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}
function weekKey(offset) { return getMondayOf(offset).toISOString().slice(0,10); }
function formatShort(d) { return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function changeWeek(dir) { weekOffset += dir; renderSchedule(); }
function resetWeek() { weekOffset = 0; renderSchedule(); }

function renderSchedule() {
  const monday = getMondayOf(weekOffset);
  const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
  document.getElementById('week-label').textContent = `${formatShort(monday)} – ${formatShort(friday)}`;
  DAYS.forEach((day, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const id = ['mon','tue','wed','thu','fri'][i];
    document.getElementById('head-' + id).innerHTML =
      `<span style="opacity:.5;font-size:10px">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span><span class="day-name">${day}</span>`;
  });
  const wk = weekKey(weekOffset);
  const body = document.getElementById('schedule-body');
  body.innerHTML = '';
  PERIODS.forEach(period => {
    const tr = document.createElement('tr');
    const timeTd = document.createElement('td');
    timeTd.className = 'time-cell';
    timeTd.textContent = period;
    tr.appendChild(timeTd);
    DAYS.forEach(day => {
      const td = document.createElement('td');
      const key = `${wk}_${day}_${period}`;
      const cell = schedule[key];
      const div = document.createElement('div');
      div.className = 'class-cell' + (cell ? ' filled' : '');
      if (cell) {
        div.style.background = cell.color.bg;
        div.style.borderColor = cell.color.border;
        div.style.color = cell.color.text;
        div.textContent = cell.name;
      } else {
        div.innerHTML = '<span class="plus">+</span>';
      }
      div.onclick = () => openModal(day, period, wk, cell);
      td.appendChild(div);
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function openModal(day, period, wk, existing) {
  editCell = { day, period, wk };
  selectedColor = existing ? CLASS_COLORS.findIndex(c => c.bg === existing.color.bg) : 0;
  if (selectedColor < 0) selectedColor = 0;
  document.getElementById('modal-title').textContent = existing ? 'Edit Class' : 'Add Class';
  document.getElementById('modal-sub').textContent = `${day} · ${period}`;
  document.getElementById('modal-input').value = existing ? existing.name : '';
  renderColorPicks();
  document.getElementById('cell-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}
function renderColorPicks() {
  const wrap = document.getElementById('color-picks');
  wrap.innerHTML = '';
  CLASS_COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-pick' + (i === selectedColor ? ' selected' : '');
    d.style.background = c.border;
    d.onclick = () => { selectedColor = i; renderColorPicks(); };
    wrap.appendChild(d);
  });
}
function saveModal() {
  const val = document.getElementById('modal-input').value.trim();
  const key = `${editCell.wk}_${editCell.day}_${editCell.period}`;
  if (val) { schedule[key] = { name: val, color: CLASS_COLORS[selectedColor] }; }
  else { delete schedule[key]; }
  save(); closeModal(); renderSchedule();
}
function closeModal() { document.getElementById('cell-modal').style.display = 'none'; editCell = null; }

function openHwForm() { document.getElementById('hw-form-wrap').style.display = 'block'; document.getElementById('hw-class').focus(); }
function closeHwForm() {
  document.getElementById('hw-form-wrap').style.display = 'none';
  ['hw-class','hw-task','hw-due','hw-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('hw-priority').value = 'Medium';
}
function saveHw() {
  const task = document.getElementById('hw-task').value.trim();
  if (!task) { document.getElementById('hw-task').focus(); return; }
  homework.push({ id: Date.now(), cls: document.getElementById('hw-class').value.trim(), task, due: document.getElementById('hw-due').value, priority: document.getElementById('hw-priority').value, notes: document.getElementById('hw-notes').value.trim(), done: false });
  save(); closeHwForm(); renderHomework();
}
function toggleDone(id) { homework = homework.map(h => h.id === id ? {...h, done: !h.done} : h); save(); renderHomework(); }
function deleteHw(id) { homework = homework.filter(h => h.id !== id); save(); renderHomework(); }

function renderHomework() {
  const wrap = document.getElementById('hw-list-wrap');
  if (!homework.length) { wrap.innerHTML = `<div class="empty-state"><div class="big">📭</div><p>No assignments yet.<br/>Click <strong>"+ Add Assignment"</strong> to get started.</p></div>`; return; }
  const groups = {};
  homework.forEach(h => { const key = h.due || '__none'; if (!groups[key]) groups[key] = []; groups[key].push(h); });
  const sorted = Object.keys(groups).sort((a, b) => { if (a === '__none') return 1; if (b === '__none') return -1; return a.localeCompare(b); });
  wrap.innerHTML = '';
  sorted.forEach(dateKey => {
    const label = document.createElement('div');
    label.className = 'hw-group-label';
    label.textContent = dateKey === '__none' ? 'No Due Date' : 'Due: ' + new Date(dateKey + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    wrap.appendChild(label);
    groups[dateKey].forEach(h => {
      const item = document.createElement('div');
      item.className = `hw-item priority-${h.priority.toLowerCase()}${h.done ? ' done' : ''}`;
      item.innerHTML = `<input type="checkbox" class="hw-check" ${h.done ? 'checked' : ''} onchange="toggleDone(${h.id})"/><div class="hw-body"><div class="hw-class">${h.cls || '—'}</div><div class="hw-task">${h.task}</div>${h.notes ? `<div class="hw-notes">${h.notes}</div>` : ''}</div><span class="priority-badge badge-${h.priority.toLowerCase()}">${h.priority}</span><button class="hw-del" onclick="deleteHw(${h.id})">×</button>`;
      wrap.appendChild(item);
    });
  });
}

function changeMonth(dir) { monthOffset += dir; renderCalendar(); }
function resetMonth() { monthOffset = 0; renderCalendar(); }
function renderCalendar() {
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = target.getFullYear(), month = target.getMonth();
  document.getElementById('month-label').textContent = target.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const hwByDate = {};
  homework.forEach(h => { if (h.due) { if (!hwByDate[h.due]) hwByDate[h.due] = []; hwByDate[h.due].push(h); } });
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => { const el = document.createElement('div'); el.className = 'cal-day-header'; el.textContent = d; grid.appendChild(el); });
  let firstDay = new Date(year, month, 1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < firstDay; i++) { const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el); }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = new Date(year, month, d).getTime() === today.getTime();
    const dayHw = hwByDate[dateStr] || [];
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' today' : '');
    const num = document.createElement('div'); num.className = 'cal-num'; num.textContent = d; cell.appendChild(num);
    dayHw.slice(0, 3).forEach(h => {
      const dot = document.createElement('div'); dot.className = 'cal-dot';
      dot.style.background = h.priority === 'High' ? '#FEE2E2' : h.priority === 'Medium' ? '#FEF3C7' : '#D1FAE5';
      dot.style.color = h.priority === 'High' ? '#991B1B' : h.priority === 'Medium' ? '#92400E' : '#065F46';
      dot.style.textDecoration = h.done ? 'line-through' : 'none';
      dot.textContent = h.task; dot.title = `${h.cls ? h.cls + ': ' : ''}${h.task}`; cell.appendChild(dot);
    });
    if (dayHw.length > 3) { const more = document.createElement('div'); more.className = 'cal-more'; more.textContent = `+${dayHw.length - 3} more`; cell.appendChild(more); }
    grid.appendChild(cell);
  }
}

renderSchedule(); renderHomework(); renderCalendar();
</script>
